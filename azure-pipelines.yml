trigger:
  branches:
    include:
      - main
      - feature/*

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: FastFeedback
    displayName: Fast feedback for developers
    jobs:
      - job: ImpactAndChecklist
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
          - script: npm ci
            displayName: Install dependencies
          - script: npm run impact
            displayName: Change impact mapping
          - script: npm run pr:checklist
            displayName: PR checklist generation

  - stage: TestAssist
    displayName: Test acceleration
    jobs:
      - job: GenerateTests
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
          - script: npm ci
            displayName: Install dependencies
          - script: npm run test:stubs
            displayName: Generate test stubs for changed files
